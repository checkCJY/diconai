global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: diconai

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: drf
    metrics_path: /metrics
    static_configs:
      - targets: ["drf:8000"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8001"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]
