    VRContentDetail:
      type: object
      description: |-
        VR 콘텐츠 단건 응답 직렬화 (read-only).

        [target_type 비노출]
        화면에서 적용 대상은 facility명으로만 표시하므로 target_type 필드는
        출력 fields에서 제외한다. service 레이어가 INSERT 시 기본값을 강제하므로
        응답에 노출할 필요 없음.

        [facility/updated_by 평면화]
        클라이언트가 별도 fetch 없이 facility명·수정자명을 바로 쓸 수 있도록
        SerializerMethodField로 1단계 평면화. 호출부는 `select_related`로 N+1
        회피.
      properties:
        id:
          type: integer
          readOnly: true
        facility_id:
          type: integer
          readOnly: true
        facility_name:
          type: string
          nullable: true
          description: target_facility가 NULL이면 None — '전사 콘텐츠' 호환.
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        operation_note:
          type: string
          readOnly: true
          title: 운영 메모
        content_url:
          type: string
          format: uri
          readOnly: true
        duration_seconds:
          type: integer
          readOnly: true
          nullable: true
          title: 재생 시간(초)
        is_active:
          type: boolean
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 최근 수정일
        updated_by_name:
          type: string
          nullable: true
          description: |-
            CustomUser의 `name` 우선, 없으면 username 폴백. updated_by 자체가
            NULL(탈퇴 사용자 등)이면 None.
          readOnly: true
      required:
      - content_url
      - description
      - duration_seconds
      - facility_id
      - facility_name
      - id
      - is_active
      - name
      - operation_note
      - updated_at
      - updated_by_name
