    NoticeCreateUpdateRequest:
      type: object
      description: |-
        흐름 위치: 요청 JSON → [이 시리얼라이저.is_valid()] → validated_data → DB 저장.
        역할: 등록(POST) / 수정(PATCH) 요청 데이터 유효성 검사.

        응답 직렬화(읽기)와 입력 직렬화(쓰기)를 분리하는 이유:
          - 응답에는 author_name(계산된 값)이 필요하지만 입력에는 불필요.
          - 입력에는 title, content 같은 쓰기 가능 필드만 선언해야 명확함.
          - 하나의 시리얼라이저에 read_only/write_only를 섞으면 코드가 복잡해짐.

        author를 입력 필드로 두지 않는 이유:
          - 클라이언트가 author를 임의 지정하면 다른 사람 이름으로 공지 등록 가능 → 보안 문제.
          - author는 뷰의 perform_create()에서 request.user로 강제 주입함.

        published_at 기본값 처리:
          - 클라이언트가 보내지 않으면 None → validate_published_at()에서 현재 시각으로 변환.
          - 미래 시각을 보내면 예약 발행이 가능한 구조.

        target_facility allow_null=True인 이유:
          - NULL = 전사 공지, 값 있음 = 특정 공장 공지.
          - 전사 공지를 만들 때는 이 필드를 비우면 되므로 null 허용.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        category:
          $ref: '#/components/schemas/CategoryEnum'
        is_pinned:
          type: boolean
          title: 상단 고정
        target_facility:
          type: integer
          nullable: true
        is_active:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
      required:
      - content
      - title
    NoticeDetail:
      type: object
      description: |-
        흐름 위치: NoticeDetailView.get() → [이 시리얼라이저] → JSON 응답.
                   NoticeListView.post() 등록 성공 후 → [이 시리얼라이저] → 201 응답.
        역할: 공지사항 1건을 첨부파일 포함 전체 직렬화.

        목록 시리얼라이저와 다른 점:
          - content(본문) 포함
          - attachments(첨부파일 배열) 포함 — NoticeAttachmentSerializer 중첩
          - target_facility 포함

        attachments에 read_only=True를 붙이는 이유:
          - 첨부파일 업로드는 별도 엔드포인트(/notices/{id}/attachments/)에서 처리.
          - 이 시리얼라이저는 응답(읽기)에만 첨부파일을 보여주고,
            입력(쓰기)에서는 첨부파일을 받지 않음.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        content:
          type: string
        category:
          $ref: '#/components/schemas/CategoryEnum'
        category_display:
          type: string
          readOnly: true
        is_pinned:
          type: boolean
          title: 상단 고정
        author_name:
          type: string
          readOnly: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/NoticeAttachment'
          readOnly: true
        target_facility:
          type: integer
          nullable: true
          description: NULL이면 전사 공지
        is_active:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성일
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 최근 수정일
      required:
      - attachments
      - author_name
      - category_display
      - content
      - created_at
      - id
      - title
      - updated_at
    NoticeList:
      type: object
      description: |-
        흐름 위치: NoticeListView.get() → AdminPagination → [이 시리얼라이저] → JSON 응답.
        역할: 공지사항 목록 1건을 가볍게 직렬화.

        content(본문)와 attachments(첨부파일 배열)를 제외하는 이유:
          - 목록은 수십~수백 건이 한 번에 내려감.
          - 본문은 길 수 있고, 첨부파일은 중첩 배열이라 건수만큼 쿼리가 늘어남.
          - 목록 화면에서는 제목, 카테고리, 작성자 정도만 필요하므로 제외가 맞음.

        author_name을 SerializerMethodField로 만드는 이유:
          - author는 FK(외래키)라 그대로 내리면 숫자 id만 반환됨.
          - 프론트에서 "홍길동 관리자"를 보여주려면 추가 API 호출이 필요해짐.
          - 미리 이름을 문자열로 합쳐서 내리면 프론트가 바로 표시 가능.

        category_display를 추가하는 이유:
          - category는 DB에 "general" 같은 코드값으로 저장됨.
          - 화면에서는 "일반 공지"(한글)를 보여줘야 하므로 display값도 함께 내림.
          - get_category_display()는 Django TextChoices가 자동으로 만들어주는 메서드.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/CategoryEnum'
        category_display:
          type: string
          readOnly: true
        is_pinned:
          type: boolean
          title: 상단 고정
        author_name:
          type: string
          readOnly: true
        attachment_count:
          type: string
          readOnly: true
        is_active:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성일
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 최근 수정일
      required:
      - attachment_count
      - author_name
      - category_display
      - created_at
      - id
      - title
      - updated_at
