openapi: 3.0.3
info:
  title: diconai API
  version: 1.0.0
  description: 산재 예방 통합 관제 시스템 — drf-server REST API
paths:
  /alerts/api/alarms/:
    get:
      operationId: alerts_api_alarms_list
      summary: 알람 기록 목록 (읽기 전용)
      parameters:
      - in: query
        name: ordering
        schema:
          type: string
        description: -created_at | risk_level
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlarmRecord'
          description: ''
  /alerts/api/alarms/{id}/:
    get:
      operationId: alerts_api_alarms_retrieve
      summary: 알람 기록 상세
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: alarm record을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlarmRecord'
          description: ''
  /alerts/api/alarms/summary/:
    get:
      operationId: alerts_api_alarms_summary_retrieve
      description: 최근 24시간 AlarmRecord 요약
      summary: 최근 24시간 알람 요약
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlarmSummaryResponse'
          description: ''
  /alerts/api/events/:
    get:
      operationId: alerts_api_events_list
      description: '`status` 쿼리로 pending/in_progress/resolved 필터링 가능.'
      summary: 이벤트 목록 조회 (읽기 전용)
      parameters:
      - in: query
        name: status
        schema:
          type: string
        description: pending | in_progress | resolved
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventList'
          description: ''
  /alerts/api/events/{id}/:
    get:
      operationId: alerts_api_events_retrieve
      summary: 이벤트 상세 조회 (소속 알람 포함)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: event을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
  /alerts/api/events/{id}/update_status/:
    patch:
      operationId: alerts_api_events_update_status_partial_update
      description: 허용된 전환만 가능 — active→{ACK,IN_PROGRESS,RESOLVED}, ACK→{IN_PROGRESS,RESOLVED},
        IN_PROGRESS→{RESOLVED}. 전환 시 EventLog에 이력 기록 + acknowledged_by/resolved_by
        자동 세팅.
      summary: 이벤트 상태 전환 (active → acknowledged → in_progress → resolved)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: event을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
        '400':
          description: 허용되지 않은 상태 전환
        '404':
          description: 이벤트 없음
  /alerts/api/my-status/:
    get:
      operationId: alerts_api_my_status_retrieve
      description: active 상태(EventStatus.RESOLVED 아닌) 이벤트 중 가장 높은 risk_level을 status로
        반환.
      summary: 작업자 본인의 미해결 이벤트 위험도 (최댓값)
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStatusResponse'
              examples:
                정상(미해결이벤트없음):
                  value:
                    status: success
                    code: 200
                    data:
                      worker_id: 5
                      status: normal
                      active_risk_level: null
                  summary: 정상 (미해결 이벤트 없음)
                위험이벤트진행중:
                  value:
                    status: success
                    code: 200
                    data:
                      worker_id: 5
                      status: danger
                      active_risk_level: danger
                  summary: 위험 이벤트 진행 중
          description: ''
        '401':
          description: 인증 필요 (토큰 누락/만료)
  /alerts/api/worker-summary/:
    get:
      operationId: alerts_api_worker_summary_retrieve
      description: 자기 공장 작업자들의 미해결 이벤트를 집계해 위험도별 인원수 반환.
      summary: 공장 내 작업자 위험도 집계 (관리자 전용)
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerSummaryResponse'
              examples:
                정상응답—25명중위험1,주의4:
                  value:
                    status: success
                    code: 200
                    data:
                      facility_id: 1
                      total_count: 25
                      normal_count: 20
                      warning_count: 4
                      danger_count: 1
                  summary: 정상 응답 — 25명 중 위험 1, 주의 4
          description: ''
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '403':
          description: 관리자 권한 필요
  /api/admin/accounts/:
    get:
      operationId: admin_accounts_list
      description: |-
        GET  /api/admin/accounts/  — 사용자 목록 조회
        POST /api/admin/accounts/  — 사용자 신규 등록

        [GET 쿼리 파라미터]
        - name       : 이름 부분 검색 (icontains)
        - department : 부서 ID
        - position   : 직급 ID
        - user_type  : 권한 (super_admin / facility_admin / worker / viewer)
        - status     : 계정 상태 (active / locked / inactive)
        - sort       : 정렬 (name_asc / name_desc / date_asc / date_desc)
        - page       : 페이지 번호 (기본 1)
        - page_size  : 페이지 크기 (기본 10, 최대 100)
      summary: 사용자 목록
      parameters:
      - in: query
        name: department
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
        description: 이름 부분검색
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: position
        schema:
          type: integer
      - in: query
        name: sort
        schema:
          type: string
        description: name_asc/name_desc/date_asc/date_desc
      - in: query
        name: status
        schema:
          type: string
        description: active/locked/inactive
      - in: query
        name: user_type
        schema:
          type: string
        description: super_admin/facility_admin/worker/viewer
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountsAdminList'
          description: ''
    post:
      operationId: admin_accounts_create
      description: 새 사용자를 등록한다. 비밀번호는 해시 처리 후 저장.
      summary: 사용자 신규 등록
      tags:
      - Admin — Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminCreate'
          description: ''
        '400':
          description: 검증 실패
  /api/admin/accounts/{id}/:
    get:
      operationId: admin_accounts_retrieve
      description: |-
        GET    /api/admin/accounts/<id>/  — 사용자 상세 조회
        PATCH  /api/admin/accounts/<id>/  — 사용자 정보 수정 (비밀번호 제외)
        DELETE /api/admin/accounts/<id>/  — 사용자 비활성화 (소프트 삭제)
      summary: 사용자 상세 조회
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminDetail'
          description: ''
        '404':
          description: 사용자 없음
    patch:
      operationId: admin_accounts_partial_update
      description: |-
        GET    /api/admin/accounts/<id>/  — 사용자 상세 조회
        PATCH  /api/admin/accounts/<id>/  — 사용자 정보 수정 (비밀번호 제외)
        DELETE /api/admin/accounts/<id>/  — 사용자 비활성화 (소프트 삭제)
      summary: 사용자 정보 수정 (Partial, 비밀번호 제외)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminList'
          description: ''
        '400':
          description: 검증 실패
        '404':
          description: 사용자 없음
    delete:
      operationId: admin_accounts_destroy
      description: 본인 계정은 비활성화 불가.
      summary: 사용자 비활성화 (Soft Delete)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '204':
          description: 삭제 완료
        '400':
          description: 본인 계정
        '404':
          description: 사용자 없음
  /api/admin/accounts/{id}/{action}/:
    post:
      operationId: admin_accounts_create_2
      description: URL의 `<action>` path parameter로 동작 구분 — `lock` 또는 `unlock`. 잠금
        시 100년 뒤로 `account_locked_until` 설정. 잠금해제 시 실패 카운터도 초기화.
      summary: 계정 잠금 / 잠금해제
      parameters:
      - in: path
        name: action
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountLockResponse'
          description: ''
        '400':
          description: 잘못된 action 값
        '404':
          description: 사용자 없음
  /api/admin/departments/:
    post:
      operationId: admin_departments_create
      description: |-
        POST /api/admin/departments/
        새 부서 생성.
      summary: 부서 신규 생성
      tags:
      - Admin — Organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeptCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeptCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeptCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptDetail'
          description: ''
        '400':
          description: 검증 실패
  /api/admin/departments/{id}/:
    get:
      operationId: admin_departments_retrieve
      description: |-
        GET    /api/admin/departments/{id}/  — 부서 상세
        PATCH  /api/admin/departments/{id}/  — 부서 수정
        DELETE /api/admin/departments/{id}/  — 부서 비활성화 (소프트 삭제)
      summary: 부서 상세
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Organization
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptDetail'
          description: ''
        '404':
          description: 부서 없음
    patch:
      operationId: admin_departments_partial_update
      description: |-
        GET    /api/admin/departments/{id}/  — 부서 상세
        PATCH  /api/admin/departments/{id}/  — 부서 수정
        DELETE /api/admin/departments/{id}/  — 부서 비활성화 (소프트 삭제)
      summary: 부서 수정 (Partial)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDeptUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDeptUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDeptUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptDetail'
          description: ''
        '400':
          description: 검증 실패
        '404':
          description: 부서 없음
    delete:
      operationId: admin_departments_destroy
      description: |-
        GET    /api/admin/departments/{id}/  — 부서 상세
        PATCH  /api/admin/departments/{id}/  — 부서 수정
        DELETE /api/admin/departments/{id}/  — 부서 비활성화 (소프트 삭제)
      summary: 부서 비활성화 (Soft Delete)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Organization
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '204':
          description: 삭제 완료
        '404':
          description: 부서 없음
  /api/admin/departments/{id}/members/:
    get:
      operationId: admin_departments_members_list
      description: 조직장이 항상 최상단. `pk='none'`이면 어디 부서에도 속하지 않은 사용자 목록 반환.
      summary: 부서 구성원 목록
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: q
        schema:
          type: string
        description: 이름/ID 검색
      tags:
      - Admin — Organization
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberList'
          description: ''
        '404':
          description: 부서 없음
  /api/admin/departments/{id}/members/add/:
    post:
      operationId: admin_departments_members_add_create
      description: '`keep_previous=true`면 이전 소속 유지(겸직), false면 주소속 변경.'
      summary: 부서 구성원 추가
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeptMemberAddRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeptMemberAddRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeptMemberAddRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptMemberAddResponse'
          description: ''
        '400':
          description: user_ids 누락
        '404':
          description: 부서 없음
  /api/admin/departments/{id}/members/assign-leader/:
    post:
      operationId: admin_departments_members_assign_leader_create
      description: 단일 사용자만 허용. 부서의 leader FK를 업데이트하고 SystemLog에 이력 기록.
      summary: 부서 조직장 임명
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeptLeaderAssignRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeptLeaderAssignRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeptLeaderAssignRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptLeaderAssignResponse'
          description: ''
        '400':
          description: user_id 누락
        '404':
          description: 부서/사용자 없음
  /api/admin/departments/{id}/members/move/:
    post:
      operationId: admin_departments_members_move_create
      description: |-
        POST /api/admin/departments/{id}/members/move/
        Body: { user_ids: [1,2,3], target_dept_id: 5, keep_previous: bool }
      summary: 부서 구성원 이동
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Admin — Organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeptMemberMoveRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeptMemberMoveRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeptMemberMoveRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeptMemberMoveResponse'
          description: ''
