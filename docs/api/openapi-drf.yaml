          title: 이메일 주소
          maxLength: 254
        department_id:
          type: integer
          nullable: true
        position:
          type: integer
          nullable: true
          title: 직급
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
      required:
      - username
    AccountsAdminCreateRequest:
      type: object
      description: 사용자 등록용
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 20
        name:
          type: string
          title: 실명
          maxLength: 30
        email:
          type: string
          format: email
          title: 이메일 주소
          maxLength: 254
        department_id:
          type: integer
          nullable: true
        position:
          type: integer
          nullable: true
          title: 직급
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE64Enum'
          writeOnly: true
      required:
      - password
      - status
      - username
    AccountsAdminDetail:
      type: object
      description: 사용자 상세 조회용 — 수정 모달 pre-fill에 필요한 FK ID 포함
