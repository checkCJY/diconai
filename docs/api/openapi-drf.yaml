      type: object
      properties:
        id:
          type: integer
          readOnly: true
        alarm_type:
          allOf:
          - $ref: '#/components/schemas/AlarmTypeEnum'
          title: 알람 유형
        risk_level:
          allOf:
          - $ref: '#/components/schemas/RiskLevel1beEnum'
          title: 위험도
