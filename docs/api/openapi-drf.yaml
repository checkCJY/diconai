    GasDataCreateAnomalyTypeEnum:
      enum:
      - co_leak
      - h2s_leak
      - fire
      - chemical_spill
      - o2_depletion
      - sensor_fault
      type: string
      description: |-
        * `co_leak` - 일산화탄소 누출
        * `h2s_leak` - 황화수소 누출
        * `fire` - 화재/폭발 전조
        * `chemical_spill` - 유해화학물 다중 누출
        * `o2_depletion` - 산소 결핍
        * `sensor_fault` - 센서 오작동
    GasDataCreateRequest:
      type: object
      description: |-
        FastAPI → DRF: GasData 수신 시리얼라이저.

        필드:
          device_id              : GasSensor.device_id → FK 매핑
          measured_at            : 장치 측정 시각 (UTC ISO 문자열)
          9종 가스 측정값         : co/h2s/co2/o2/no2/so2/o3/nh3/voc
          9종 위험도              : *_risk (FastAPI 가 임계치 기준으로 계산)
          raw_payload            : 원본(lel 포함)
          is_anomaly/anomaly_type: 더미 시뮬레이터 시나리오 라벨 (IF 학습 평가용).
                                   운영 센서 페이로드는 비워서 기본값(False/None) 저장.
      properties:
        device_id:
          type: string
          writeOnly: true
          minLength: 1
        ingress_ts:
          type: number
          format: double
          writeOnly: true
          nullable: true
        measured_at:
          type: string
          format: date-time
          title: 측정 시각
        co:
          type: number
          format: double
          nullable: true
          title: 일산화탄소 (ppm)
        h2s:
          type: number
          format: double
          nullable: true
          title: 황화수소 (ppm)
        co2:
          type: number
          format: double
          nullable: true
          title: 이산화탄소 (ppm)
        o2:
          type: number
          format: double
          nullable: true
          title: 산소 (%)
        no2:
          type: number
          format: double
          nullable: true
          title: 이산화질소 (ppm)
        so2:
          type: number
          format: double
          nullable: true
          title: 이산화황 (ppm)
        o3:
          type: number
          format: double
          nullable: true
          title: 오존 (ppm)
        nh3:
          type: number
          format: double
          nullable: true
          title: 암모니아 (ppm)
        voc:
          type: number
          format: double
          nullable: true
          title: 휘발성유기화합물 (ppm)
        co_risk:
          nullable: true
          title: CO 위험도
          oneOf:
          - $ref: '#/components/schemas/CoRiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        h2s_risk:
          nullable: true
          title: H2S 위험도
          oneOf:
          - $ref: '#/components/schemas/H2sRiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        co2_risk:
          nullable: true
          title: CO2 위험도
          oneOf:
          - $ref: '#/components/schemas/Co2RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        o2_risk:
          nullable: true
          title: O2 위험도
          oneOf:
          - $ref: '#/components/schemas/O2RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        no2_risk:
          nullable: true
          title: NO2 위험도
          oneOf:
          - $ref: '#/components/schemas/No2RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        so2_risk:
          nullable: true
          title: SO2 위험도
          oneOf:
          - $ref: '#/components/schemas/So2RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        o3_risk:
          nullable: true
          title: O3 위험도
          oneOf:
          - $ref: '#/components/schemas/O3RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        nh3_risk:
          nullable: true
          title: NH3 위험도
          oneOf:
          - $ref: '#/components/schemas/Nh3RiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        voc_risk:
          nullable: true
          title: VOC 위험도
          oneOf:
          - $ref: '#/components/schemas/VocRiskEnum'
          - $ref: '#/components/schemas/NullEnum'
        raw_payload:
          nullable: true
          title: 원본 수신 페이로드
        is_anomaly:
          type: boolean
          title: 이상 라벨
          description: 더미 시뮬레이터/운영자 라벨링용
        anomaly_type:
          nullable: true
          title: 이상 시나리오
          description: |-
            더미 시뮬레이터 시나리오 라벨 — IF 학습 평가용

            * `co_leak` - 일산화탄소 누출
            * `h2s_leak` - 황화수소 누출
            * `fire` - 화재/폭발 전조
            * `chemical_spill` - 유해화학물 다중 누출
            * `o2_depletion` - 산소 결핍
            * `sensor_fault` - 센서 오작동
          oneOf:
          - $ref: '#/components/schemas/GasDataCreateAnomalyTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - device_id
      - measured_at
