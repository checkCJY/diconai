      description: |-
        작업자 페이지용 VR 콘텐츠 조회 — 인증 사용자 누구나.

        [JWT 인증 + 작업자 공용]
        `safety_vr_page`(SSR)가 JWT-only 환경에서 `request.user`가 비어 발생한
        버그를 회피하기 위해, 페이지 렌더는 빈 셸만 보내고 클라이언트가 본 API로
        실제 URL을 가져간다. 어드민 API(`/api/admin/training/...`)와 달리
        `IsAuthenticated`만 요구하므로 worker도 호출 가능.

        [facility 해석]
        `user.facility_id || default` 폴백. 다중 공장 전환 시 worker 폴백은
        제거해야 함 (후속 과제 — 본 PR에서는 단일 공장 단계에 맞춤).
      summary: 작업자 페이지용 VR 콘텐츠 1건 조회
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerVRContent'
          description: ''
  /dashboard/api/vr-progress/:
    get:
      operationId: dashboard_api_vr_progress_retrieve
      description: |-
        VR 시청 위치 임시 저장 (세션).

        [user_id 가드]
        Django 세션은 브라우저 단위라 같은 PC에서 사용자 A가 보던 위치가 사용자 B
        로그인 후에도 남아 즉시 ended로 점프하는 버그가 있다. 세션에 user_id를
        함께 저장하고, GET 시 현재 인증 사용자와 일치하지 않으면 빈 값으로 응답해
        누설을 차단한다.

        [content_id 가드]
        어드민이 영상을 교체했을 때 이전 영상의 position이 새 영상에 잘못 적용되어
        검은 화면이나 즉시 종료가 일어나는 버그를 막는다. 클라이언트가 페이지의
        현재 content_id와 응답의 content_id가 일치할 때만 position을 복원한다.
      summary: VR 안전교육 시청 위치 조회 (세션)
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VRProgressGet'
          description: ''
    post:
      operationId: dashboard_api_vr_progress_create
      description: |-
        VR 시청 위치 임시 저장 (세션).

        [user_id 가드]
        Django 세션은 브라우저 단위라 같은 PC에서 사용자 A가 보던 위치가 사용자 B
        로그인 후에도 남아 즉시 ended로 점프하는 버그가 있다. 세션에 user_id를
        함께 저장하고, GET 시 현재 인증 사용자와 일치하지 않으면 빈 값으로 응답해
        누설을 차단한다.

        [content_id 가드]
        어드민이 영상을 교체했을 때 이전 영상의 position이 새 영상에 잘못 적용되어
        검은 화면이나 즉시 종료가 일어나는 버그를 막는다. 클라이언트가 페이지의
        현재 content_id와 응답의 content_id가 일치할 때만 position을 복원한다.
      summary: VR 안전교육 시청 위치 저장 (세션)
      tags:
      - Dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VRProgressPostRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VRProgressPostRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VRProgressPostRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VRProgressSaved'
          description: ''
  /dashboard/api/workers-list/:
    get:
      operationId: dashboard_api_workers_list_retrieve
      description: facility_admin은 자기 공장 사용자만, super_admin은 전체 활성 사용자. 오늘 LoginLog
        성공 기록 유무로 `is_present` 자동 계산.
      summary: 작업자 목록 + 부서 드롭다운 (관리자 전용)
      parameters:
      - in: query
        name: department_id
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
        description: 이름 부분검색
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerListResponse'
          description: ''
        '403':
          description: 관리자 권한 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: permission_denied
                  message: 이 작업을 수행할 권한이 없습니다.
components:
  schemas:
    AccountLockResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
      - ok
    AccountsAdminCreate:
      type: object
      description: 사용자 등록용
      properties:
        username:
          type: string
        name:
          type: string
          title: 실명
          maxLength: 30
        email:
          type: string
          format: email
          title: 이메일 주소
          maxLength: 254
        department_id:
          type: integer
          nullable: true
        facility_id:
          type: integer
          nullable: true
        position:
          type: integer
          nullable: true
          title: 직급
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
      required:
      - username
    AccountsAdminCreateRequest:
      type: object
      description: 사용자 등록용
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 20
        name:
          type: string
          title: 실명
          maxLength: 30
        email:
          type: string
          format: email
          title: 이메일 주소
          maxLength: 254
        department_id:
          type: integer
          nullable: true
        facility_id:
          type: integer
          nullable: true
        position:
          type: integer
          nullable: true
          title: 직급
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE64Enum'
          writeOnly: true
      required:
      - password
      - status
      - username
    AccountsAdminDetail:
      type: object
      description: 사용자 상세 조회용 — 수정 모달 pre-fill에 필요한 FK ID 포함
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 실명
          maxLength: 30
        username:
          type: string
          title: 사용자 이름
          description: 150자 이하 문자, 숫자 그리고 @/./+/-/_만 가능합니다.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: 이메일 주소
          maxLength: 254
        department_id:
          type: string
          readOnly: true
        department_name:
          type: string
          readOnly: true
        facility_id:
          type: string
          readOnly: true
        facility_name:
          type: string
          readOnly: true
        position_id:
          type: string
          readOnly: true
        position_name:
          type: string
          readOnly: true
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          type: string
          readOnly: true
      required:
      - department_id
      - department_name
      - facility_id
      - facility_name
      - id
      - position_id
      - position_name
      - status
      - username
    AccountsAdminList:
      type: object
      description: 사용자 목록 조회용 (읽기 전용)
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 실명
          maxLength: 30
        username:
          type: string
          title: 사용자 이름
          description: 150자 이하 문자, 숫자 그리고 @/./+/-/_만 가능합니다.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        department:
          type: string
          readOnly: true
        facility_name:
          type: string
          readOnly: true
        position:
          type: string
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          type: string
          readOnly: true
        last_login_at:
          type: string
          readOnly: true
        date_joined:
          type: string
          format: date-time
          title: 등록일
      required:
      - department
      - facility_name
      - id
      - last_login_at
      - status
      - username
    ActionTypeEnum:
      enum:
      - user_create
      - user_deactivate
      - user_update
      - permission_change
      - device_create
      - device_deactivate
      - device_status_change
      - geofence_create
      - geofence_update
      - geofence_deactivate
      - threshold_update
      - checklist_update
      - manual_event_action
      - dept_create
      - dept_update
      - dept_delete
      - member_add
      - member_remove
      - member_move
      - leader_assign
      - map_geofence_create
      - map_sensor_move
      - map_facility_update
      - map_position_node_register
      - map_object_delete
      - policy_created
      - policy_updated
      - policy_deactivated
      - notice_create
      - notice_update
      - notice_delete
      - vr_content_created
      - vr_content_replaced
      - vr_content_toggled
      - checklist_revision_published
      - checklist_section_created
      - checklist_item_deactivated
      type: string
      description: |-
        * `user_create` - 사용자 생성
        * `user_deactivate` - 사용자 비활성화
        * `user_update` - 사용자 정보 변경
        * `permission_change` - 권한 변경
        * `device_create` - 장비 등록
        * `device_deactivate` - 장비 비활성화
        * `device_status_change` - 장비 상태 변경
        * `geofence_create` - 구역 생성
        * `geofence_update` - 구역 수정
        * `geofence_deactivate` - 구역 비활성화
        * `threshold_update` - 임계치 변경
        * `checklist_update` - 체크리스트 변경
        * `manual_event_action` - 이벤트 수동 조치
        * `dept_create` - 부서 생성
        * `dept_update` - 부서 수정
        * `dept_delete` - 부서 삭제
        * `member_add` - 구성원 추가
        * `member_remove` - 소속 제외
        * `member_move` - 부서 이동
        * `leader_assign` - 조직장 임명
        * `map_geofence_create` - 위험구역 생성 (지도)
        * `map_sensor_move` - 센서 이동
        * `map_facility_update` - 설비 수정
        * `map_position_node_register` - 위치 노드 등록
        * `map_object_delete` - 객체 삭제
        * `policy_created` - 알림 정책 생성
        * `policy_updated` - 알림 정책 수정
        * `policy_deactivated` - 알림 정책 비활성화
        * `notice_create` - 공지 생성
