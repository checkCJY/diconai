        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 실명
          maxLength: 30
        username:
          type: string
          title: 사용자 이름
          description: 150자 이하 문자, 숫자 그리고 @/./+/-/_만 가능합니다.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: 이메일 주소
          maxLength: 254
        department_id:
          type: string
          readOnly: true
        department_name:
          type: string
          readOnly: true
        position_id:
          type: string
          readOnly: true
        position_name:
          type: string
          readOnly: true
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          type: string
          readOnly: true
      required:
      - department_id
      - department_name
      - id
      - position_id
      - position_name
      - status
      - username
    AccountsAdminList:
      type: object
      description: 사용자 목록 조회용 (읽기 전용)
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 실명
          maxLength: 30
        username:
          type: string
          title: 사용자 이름
          description: 150자 이하 문자, 숫자 그리고 @/./+/-/_만 가능합니다.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        department:
          type: string
          readOnly: true
        position:
          type: string
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          title: 사용자 유형
        phone:
          type: string
          title: 비상 연락처
          pattern: ^\+?1?\d{9,15}$
          maxLength: 15
        status:
          type: string
          readOnly: true
