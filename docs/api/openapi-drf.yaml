  /api/monitoring/gas/:
    post:
      operationId: monitoring_gas_create
      description: |-
        FastAPI(:8001)가 IoT 가스 센서로부터 받은 측정값을 DRF에 영속화 요청.

        **무인증** — 서버-서버 호출 전용. 외부 노출 금지(이상적으로 reverse proxy에서 차단). Phase 5+에서 `DRF_SERVICE_TOKEN` 또는 IP 화이트리스트로 보호 예정.
      summary: 가스 측정값 인입 (FastAPI → DRF)
      tags:
      - Monitoring (Ingest)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GasDataCreateRequest'
            examples:
              정상가스측정페이로드:
                value:
                  device_id: sensor_01
                  received_at: '2026-05-06T17:00:00Z'
                  co: 5.2
                  h2s: 0.5
                  co2: 800
                  o2: 20.9
                  no2: 0.1
                  so2: 0.05
                  o3: 0.02
                  nh3: 1.0
                  voc: 0.5
                  max_risk_level: normal
                summary: 정상 가스 측정 페이로드
                description: FastAPI에서 1초 주기로 전송하는 9종 가스 측정값
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GasDataCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GasDataCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GasDataIngestResponse'
              examples:
                정상응답:
                  value:
                    id: 12345
                    received: true
                    alarms: []
                  summary: 정상 응답
                위험가스감지응답(알람동반):
                  value:
                    id: 12346
                    received: true
                    alarms:
                    - gas_type: co
                      risk_level: danger
                      measured_value: 250
                      threshold: 200
                  summary: 위험 가스 감지 응답 (알람 동반)
          description: ''
        '400':
          description: 검증 실패
  /api/monitoring/power/data/:
    post:
      operationId: monitoring_power_data_create
      description: 전류(A) / 전압(V) / 전력(W) 측정값 16채널을 한 번에 PowerData로 영속화. data_type
        필드로 측정 종류 구분. 무인증 서버-서버 전용.
      summary: 전력 16채널 측정값 일괄 인입 (FastAPI → DRF)
      tags:
      - Monitoring (Ingest)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PowerDataBulkIngestRequest'
            examples:
              전력(W)측정값16채널:
                value:
                  device_id: power_01
                  measured_at: '2026-05-06T17:00:00Z'
                  data_type: watt
                  channels:
                  - channel: 1
                    value: 1850
                  - channel: 2
                    value: 1620
                  - channel: 3
                    value: -1
                  - channel: 4
                    value: 2100
                summary: 전력(W) 측정값 16채널
                description: data_type='watt'인 경우. 채널 -1 값은 통신 불능 채널(저장은 됨)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PowerDataBulkIngestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PowerDataBulkIngestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerDataBulkIngestResponse'
              examples:
                정상응답:
                  value:
                    created: 16
                  summary: 정상 응답
          description: ''
        '400':
          description: 검증 실패
