        '404':
          description: 공지사항 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
    delete:
      operationId: admin_notices_attachments_destroy
      description: |-
