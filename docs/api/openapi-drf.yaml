    IntegrationLogAdmin:
      type: object
      description: |-
        흐름 위치: IntegrationLogAdminListView → AdminPagination → [이 시리얼라이저] → JSON.
        역할: IntegrationLog 1건을 JSON으로 변환.

        기존 IntegrationLogCreateSerializer(입력용)와 이름이 다른 이유:
          - 기존 것은 FastAPI → DRF 연동 기록 생성(쓰기)용이다.
          - 이 시리얼라이저는 관리자 화면 조회(읽기)용이다.
          - 같은 이름을 쓰면 import할 때 어느 용도인지 구분이 안 된다.

        integration_type_display, result_display를 추가하는 이유:
          - 두 필드 모두 TextChoices라 DB에는 코드값("collect", "success")으로 저장된다.
          - 화면에서는 "수집", "성공" 같은 한글이 필요하다.
      properties:
        id:
          type: integer
          readOnly: true
        integration_type:
          allOf:
          - $ref: '#/components/schemas/IntegrationTypeEnum'
          title: 연동 유형
        integration_type_display:
          type: string
          readOnly: true
        target_system:
          type: string
          title: 대상 시스템
          description: '형식: "FastAPI→DRF" 또는 "GasSensor:GS-001"'
          maxLength: 100
        result:
          $ref: '#/components/schemas/Result7caEnum'
        result_display:
          type: string
          readOnly: true
        description:
          type: string
        extra:
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - integration_type
      - integration_type_display
      - result
      - result_display
      - target_system
    IntegrationLogCreateRequest:
      type: object
      properties:
        integration_type:
          allOf:
          - $ref: '#/components/schemas/IntegrationTypeEnum'
          title: 연동 유형
        target_system:
          type: string
          minLength: 1
