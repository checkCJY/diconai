          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VRContentDetail'
          description: ''
        '400':
          description: facility_id 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
