        device_id:
          type: string
          minLength: 1
          maxLength: 50
        measured_at:
          type: string
          format: date-time
        data_type:
          $ref: '#/components/schemas/DataTypeEnum'
        channels:
          type: array
          items:
            $ref: '#/components/schemas/_ChannelEntryRequest'
      required:
      - channels
      - data_type
      - device_id
      - measured_at
