          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoticeAttachmentUploadRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeAttachment'
          description: ''
        '400':
          description: 파일 없음 또는 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
