openapi: 3.0.3
info:
  title: diconai API
  version: 1.0.0
  description: 산재 예방 통합 관제 시스템 — drf-server REST API
paths:
  /alerts/api/alarms/:
    get:
      operationId: alerts_api_alarms_list
      summary: 알람 기록 목록 (읽기 전용)
      parameters:
      - in: query
        name: ordering
        schema:
          type: string
        description: -created_at | risk_level
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlarmRecord'
          description: ''
  /alerts/api/alarms/{id}/:
    get:
      operationId: alerts_api_alarms_retrieve
      summary: 알람 기록 상세
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: alarm record을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlarmRecord'
          description: ''
  /alerts/api/alarms/catch-up/:
    get:
      operationId: alerts_api_alarms_catch_up_retrieve
      description: 클라이언트가 WS 끊김 후 재연결할 때 localStorage 의 last_seen_ts 를 since 로 전달해
        미수신 알람을 보충. fastapi 거치지 않고 클라가 drf 직접 호출 — simplicity. 응답 모양은 fastapi broadcast
        payload 와 동일해 클라 측 mapper 공용 처리 가능. since=24h 이상 과거면 24h 까지로 클램프. 최대 100건
        응답.
      summary: WS 재연결 catch-up — since 이후 24h 내 미수신 알람
      parameters:
      - in: query
        name: since
        schema:
          type: number
          format: double
        description: unix timestamp (초 단위). 누락/잘못된 값이면 빈 list 반환.
        required: true
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlarmCatchUpResponse'
          description: ''
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
  /alerts/api/alarms/summary/:
    get:
      operationId: alerts_api_alarms_summary_retrieve
      description: |-
        최근 24시간 AlarmRecord 누적 + 현재 미확인 Event 건수.

        24h 누적 (last_24h_*) 은 운영 통계용, 미확인 (unacknowledged_event_count) 은
        "지금 운영자가 처리해야 할 사건 수". Event.status ∈ {active, acknowledged,
        in_progress} 가 미확인 (resolved 는 처리 완료라 제외).

        user_unread_event_count — 본인이 아직 ack 안 한 활성 이벤트 수
        (EventAcknowledgement 활용). 헤더 미확인 배지의 초기값. 글로벌 unacknowledged
        와 달리 본 사람만 줄어드는 카운트.
      summary: 최근 24시간 알람 요약 + 현재 미확인 이벤트 건수
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlarmSummaryResponse'
          description: ''
  /alerts/api/anomaly-alarm-records/:
    post:
      operationId: alerts_api_anomaly_alarm_records_create
      description: AI 이상탐지 알람 INSERT. 내부 API — fastapi 만 호출.
      summary: AI 이상탐지 알람 INSERT (FastAPI → DRF)
      tags:
      - Internal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyAlarmRecordPayloadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnomalyAlarmRecordPayloadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnomalyAlarmRecordPayloadRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyAlarmRecordCreateResponse'
          description: ''
        '404':
          description: 발생원 장비/센서를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
  /alerts/api/events/:
    get:
      operationId: alerts_api_events_list
      description: '`status` 쿼리로 pending/in_progress/resolved 필터링 가능.'
      summary: 이벤트 목록 조회 (읽기 전용)
      parameters:
      - name: page
        required: false
        in: query
        description: 페이지네이션된 결과 집합 내의 페이지 번호.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: 페이지당 반환할 결과 수.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
        description: pending | in_progress | resolved
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventListList'
          description: ''
  /alerts/api/events/{id}/:
    get:
      operationId: alerts_api_events_retrieve
      summary: 이벤트 상세 조회 (소속 알람 포함)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: event을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
  /alerts/api/events/{id}/ack/:
    post:
      operationId: alerts_api_events_ack_create
      description: '프론트 알람 팝업의 ''확인 완료'' 클릭이 호출. (request.user, event) 쌍의 EventAcknowledgement
        를 get_or_create — 이미 있으면 noop (idempotent). Event.status 는 건드리지 않음 (글로벌 워크플로우와
        user-scoped 표시 관리 분리). 재팝업 정책: 이 행이 있는 user 에게는 broadcast 시점에 push 생략.'
      summary: 이벤트 사용자별 확인(ack) 기록 — user-scoped
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: event을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAcknowledgementResponse'
          description: ''
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '404':
          description: 이벤트 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
  /alerts/api/events/{id}/update_status/:
    patch:
      operationId: alerts_api_events_update_status_partial_update
      description: 허용된 전환만 가능 — active→{ACK,IN_PROGRESS,RESOLVED}, ACK→{IN_PROGRESS,RESOLVED},
        IN_PROGRESS→{RESOLVED}. 전환 시 EventLog에 이력 기록 + acknowledged_by/resolved_by
        자동 세팅.
      summary: 이벤트 상태 전환 (active → acknowledged → in_progress → resolved)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: event을 식별하는 고유한 정수 값.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEventStatusUpdateRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
        '400':
          description: 허용되지 않은 상태 전환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: validation_failed
                  message: 요청 데이터 검증에 실패했습니다.
                  details:
                    field_name:
                    - 이 필드는 필수 항목입니다.
        '404':
          description: 이벤트 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
  /alerts/api/my-status/:
    get:
      operationId: alerts_api_my_status_retrieve
      description: active 상태(EventStatus.RESOLVED 아닌) 이벤트 중 가장 높은 risk_level을 status로
        반환.
      summary: 작업자 본인의 미해결 이벤트 위험도 (최댓값)
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStatusResponse'
              examples:
                정상(미해결이벤트없음):
                  value:
                    status: success
                    code: 200
                    data:
                      worker_id: 5
                      status: normal
                      active_risk_level: null
                  summary: 정상 (미해결 이벤트 없음)
                위험이벤트진행중:
                  value:
                    status: success
                    code: 200
                    data:
                      worker_id: 5
                      status: danger
                      active_risk_level: danger
                  summary: 위험 이벤트 진행 중
          description: ''
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
  /alerts/api/worker-summary/:
    get:
      operationId: alerts_api_worker_summary_retrieve
      description: 자기 공장 작업자들의 미해결 이벤트를 집계해 위험도별 인원수 반환.
      summary: 공장 내 작업자 위험도 집계 (관리자 전용)
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerSummaryResponse'
              examples:
                정상응답—25명중위험1,주의4:
                  value:
                    status: success
                    code: 200
                    data:
                      facility_id: 1
                      total_count: 25
                      normal_count: 20
                      warning_count: 4
                      danger_count: 1
                  summary: 정상 응답 — 25명 중 위험 1, 주의 4
          description: ''
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '403':
          description: 관리자 권한 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: permission_denied
                  message: 이 작업을 수행할 권한이 없습니다.
  /api/admin/accounts/:
    get:
      operationId: admin_accounts_list
      description: |-
        GET  /api/admin/accounts/  — 사용자 목록 조회
        POST /api/admin/accounts/  — 사용자 신규 등록

        [GET 쿼리 파라미터]
        - name       : 이름 부분 검색 (icontains)
        - department : 부서 ID
        - position   : 직급 ID
        - user_type  : 권한 (super_admin / facility_admin / worker / viewer)
        - status     : 계정 상태 (active / locked / inactive)
        - sort       : 정렬 (name_asc / name_desc / date_asc / date_desc)
        - page       : 페이지 번호 (기본 1)
        - page_size  : 페이지 크기 (기본 10, 최대 100)
      summary: 사용자 목록
      parameters:
      - in: query
        name: department
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
        description: 이름 부분검색
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: position
        schema:
          type: integer
      - in: query
        name: sort
        schema:
          type: string
        description: name_asc/name_desc/date_asc/date_desc
      - in: query
        name: status
        schema:
          type: string
        description: active/locked/inactive
      - in: query
        name: user_type
        schema:
          type: string
        description: super_admin/facility_admin/worker/viewer
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountsAdminList'
          description: ''
    post:
      operationId: admin_accounts_create
      description: 새 사용자를 등록한다. 비밀번호는 해시 처리 후 저장.
      summary: 사용자 신규 등록
      tags:
      - Admin — Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountsAdminCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminCreate'
          description: ''
        '400':
          description: 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: validation_failed
                  message: 요청 데이터 검증에 실패했습니다.
                  details:
                    field_name:
                    - 이 필드는 필수 항목입니다.
  /api/admin/accounts/{id}/:
    get:
      operationId: admin_accounts_retrieve
      description: |-
        GET    /api/admin/accounts/<id>/  — 사용자 상세 조회
        PATCH  /api/admin/accounts/<id>/  — 사용자 정보 수정 (비밀번호 제외)
        DELETE /api/admin/accounts/<id>/  — 사용자 비활성화 (소프트 삭제)
      summary: 사용자 상세 조회
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminDetail'
          description: ''
        '404':
          description: 사용자 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
    patch:
      operationId: admin_accounts_partial_update
      description: |-
        GET    /api/admin/accounts/<id>/  — 사용자 상세 조회
        PATCH  /api/admin/accounts/<id>/  — 사용자 정보 수정 (비밀번호 제외)
        DELETE /api/admin/accounts/<id>/  — 사용자 비활성화 (소프트 삭제)
      summary: 사용자 정보 수정 (Partial, 비밀번호 제외)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAccountsAdminUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsAdminList'
          description: ''
        '400':
          description: 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: validation_failed
                  message: 요청 데이터 검증에 실패했습니다.
                  details:
                    field_name:
                    - 이 필드는 필수 항목입니다.
        '404':
          description: 사용자 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
    delete:
      operationId: admin_accounts_destroy
      description: 본인 계정은 비활성화 불가.
      summary: 사용자 비활성화 (Soft Delete)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Accounts
      security:
      - jwtAuth: []
      responses:
        '401':
          description: 인증 필요 (토큰 누락/만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: authentication_required
                  message: 인증이 필요합니다.
        '204':
          description: 삭제 완료
        '400':
          description: 본인 계정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: validation_failed
