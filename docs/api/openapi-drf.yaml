          - 등록 후 파일을 별도로 추가하는 UX 패턴이 일반적.
      summary: 첨부파일 업로드
      parameters:
      - in: path
        name: att_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Admin — Notices
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NoticeAttachmentUploadRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoticeAttachmentUploadRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeAttachment'
          description: ''
        '400':
          description: 파일 없음 또는 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: validation_failed
                  message: 요청 데이터 검증에 실패했습니다.
                  details:
                    field_name:
                    - 이 필드는 필수 항목입니다.
        '404':
          description: 공지사항 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: not_found
                  message: 요청하신 리소스를 찾을 수 없습니다.
    delete:
      operationId: admin_notices_attachments_destroy_2
      description: |-
        흐름:
          1. pk(공지사항)와 att_id(첨부파일) 모두 확인
             notice_id=pk 조건을 추가하는 이유:
             다른 공지사항의 첨부파일 id를 넣어도 삭제되는 것을 막기 위함.
          2. storage에서 실제 파일 삭제 + DB 레코드 삭제
          3. 204 반환
      summary: 첨부파일 삭제
