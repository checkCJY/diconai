      tags:
      - Monitoring (Ingest)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GasDataCreateRequest'
            examples:
              정상가스측정페이로드:
                value:
                  device_id: sensor_01
                  received_at: '2026-05-06T17:00:00Z'
                  co: 5.2
                  h2s: 0.5
                  co2: 800
                  o2: 20.9
