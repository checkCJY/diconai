          - 프론트가 바로 <a href>에 쓰려면 "http://localhost:8000/media/..." 전체 URL이 필요함.
          - request.build_absolute_uri()로 절대 URL을 만들어 반환함.
          - request는 뷰에서 context={"request": request}로 전달받음.
