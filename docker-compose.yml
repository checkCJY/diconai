name: diconai

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # drf: Django REST API + 어드민/대시보드 HTML 렌더링 서버 (포트 8000).
  # 현재 compose는 개발용으로 구성됨 — 핫리로드 3단 결합:
  #   1) 소스 볼륨 마운트(./drf-server:/app)로 호스트 변경이 즉시 컨테이너에 노출
  #   2) gunicorn --reload + --workers=1로 .py 변경 시 워커 자동 재시작 (~1-2초)
  #   3) DJANGO_DEBUG=True + settings.py 분기로 WhiteNoise StaticFilesStorage +
  #      WHITENOISE_USE_FINDERS/AUTOREFRESH 활성 → .css/.js/템플릿 변경이 다음 요청에 반영
  # 운영용 compose 분리 시 위 3가지를 모두 끄고 collectstatic + multi-worker로 전환.
  drf:
    build:
      context: ./drf-server
    image: diconai/drf:dev
    # host 유저 UID/GID 로 실행 — 컨테이너 안에서 생성된 파일(마이그/모델 .pkl/db.sqlite3)
    # 이 host 에 root 소유로 노출되어 pre-commit/git 작업이 막히는 문제 회피.
    # WSL2 Ubuntu 기본 uid=1000. 다른 환경은 `UID=$(id -u) GID=$(id -g) docker compose up`.
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./.env.docker
    environment:
      DATABASE_URL: sqlite:////app/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      DJANGO_DEBUG: "True"      # 개발: 템플릿/정적 핫리로드 활성 (운영에선 False)
      COLLECT_STATIC: "0"       # WHITENOISE_USE_FINDERS=True → collectstatic 불필요
    volumes:
      # 소스 핫리로드용 — 코드/템플릿/정적 변경이 별도 빌드 없이 즉시 컨테이너에 노출.
      # 하위 db.sqlite3/media는 명시적 mount로 source 경계를 분명히 함 (영속 데이터 표시).
      - ./drf-server:/app
      - ./drf-server/db.sqlite3:/app/db.sqlite3
      - ./drf-server/media:/app/media
    command:
      # workers=1 + --reload 조합 — multi-worker에선 inotify가 워커별 분산되며 reload가 불안정.
      # 운영 배포 시 workers=(2*CPU)+1 권장, --reload 제거.
      - gunicorn
      - config.wsgi:application
      - --bind=0.0.0.0:8000
      - --workers=1
      - --reload
      - --access-logfile=-
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  fastapi:
    build:
      context: ./fastapi-server
    image: diconai/fastapi:dev
    user: "${UID:-1000}:${GID:-1000}"  # host UID 매핑 — drf 와 동일 이유
    env_file: ./.env.docker
    environment:
      DRF_BASE_URL: http://drf:8000
      REDIS_URL: redis://redis:6379/0
    volumes:
      # 소스 핫리로드 — celery-worker/drf와 동일하게 호스트 코드를 마운트해
      # 라우터/서비스 코드 변경이 `restart` 한 번으로 반영된다.
      - ./fastapi-server:/app
      # IF 모델 .pkl 공유 (read-only) — drf 가 학습 → fastapi 가 추론.
      # host: ./drf-server/ml_models/  →  fastapi: /app/ml_models/ (Settings.ML_MODELS_DIR)
      - ./drf-server/ml_models:/app/ml_models:ro
    depends_on:
      drf:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped

  celery-worker:
    image: diconai/drf:dev
    user: "${UID:-1000}:${GID:-1000}"  # host UID 매핑 — drf 와 동일 이유
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=2"]
    env_file: ./.env.docker
    environment:
      DATABASE_URL: sqlite:////app/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
    volumes:
      # 소스 핫리로드 — drf 서비스와 동일하게 호스트 코드를 마운트해야
      # tasks.py 등 worker 코드 변경이 별도 빌드 없이 restart만으로 반영된다.
      - ./drf-server:/app
      - ./drf-server/db.sqlite3:/app/db.sqlite3
      - ./drf-server/media:/app/media
    depends_on:
      drf:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: diconai/drf:dev
    user: "${UID:-1000}:${GID:-1000}"  # host UID 매핑 — drf 와 동일 이유
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    env_file: ./.env.docker
    environment:
      DATABASE_URL: sqlite:////app/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
    volumes:
      - ./drf-server:/app          # 소스코드 실시간 반영
    depends_on:
      drf:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    depends_on:
      - drf
      - fastapi
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    env_file: ./.env.docker
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redis_data:
  drf_static:
  prom_data:
  grafana_data:
