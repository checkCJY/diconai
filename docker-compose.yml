name: diconai

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    shm_size: 256mb
    env_file: ./.env.docker
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - statement_timeout=60s
      - -c
      - idle_in_transaction_session_timeout=30s
      - -c
      - max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # dev 전용 — DBeaver 등 GUI 클라이언트가 호스트에서 붙도록 노출.
    # 127.0.0.1 바인딩으로 외부 네트워크 노출은 막음 (WSL2는 Windows localhost 자동 포워딩).
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diconai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # drf: Django REST API + 어드민/대시보드 HTML 렌더링 서버 (포트 8000).
  # 현재 compose는 개발용으로 구성됨 — 핫리로드 3단 결합:
  #   1) 소스 볼륨 마운트(./drf-server:/app)로 호스트 변경이 즉시 컨테이너에 노출
  #   2) gunicorn --reload + --workers=1로 .py 변경 시 워커 자동 재시작 (~1-2초)
  #   3) DJANGO_DEBUG=True + settings.py 분기로 WhiteNoise StaticFilesStorage +
  #      WHITENOISE_USE_FINDERS/AUTOREFRESH 활성 → .css/.js/템플릿 변경이 다음 요청에 반영
  # 운영용 compose 분리 시 위 3가지를 모두 끄고 collectstatic + multi-worker로 전환.
  drf:
    build:
      context: ./drf-server
    image: diconai/drf:dev
    # host 유저 UID/GID 로 실행 — 컨테이너 안에서 생성된 파일(마이그/모델 .pkl/db.sqlite3)
    # 이 host 에 root 소유로 노출되어 pre-commit/git 작업이 막히는 문제 회피.
    # WSL2 Ubuntu 기본 uid=1000. 다른 환경은 `UID=$(id -u) GID=$(id -g) docker compose up`.
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./.env.docker
    environment:
      REDIS_URL: redis://redis:6379/0
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      DJANGO_SETTINGS_MODULE: "config.settings.prod"  # 운영 설정 고정 (DEBUG=False 강제)
      COLLECT_STATIC: "0"       # WHITENOISE_USE_FINDERS=True → collectstatic 불필요
      # prometheus_client multiprocess 모드 — drf/celery 컨테이너가 서브디렉토리별로 분리해 쓴다.
      # 같은 /app 볼륨을 공유하지만 두 컨테이너 모두 PID 1이라 동일 경로를 쓰면 histogram_1.db 충돌.
      # entrypoint.sh가 재시작 시 $PROMETHEUS_MULTIPROC_DIR 안의 *.db를 청소하는데,
      # 경로가 같으면 Celery 재시작이 DRF worker 파일까지 삭제해 /metrics에서 DRF 메트릭이 사라짐.
      # → drf/celery 서브디렉토리로 격리. metrics_view에서 두 경로를 합산해 노출.
      PROMETHEUS_MULTIPROC_DIR: /app/prometheus_multiproc/drf
    volumes:
      # 소스 핫리로드용 — 코드/템플릿/정적 변경이 별도 빌드 없이 즉시 컨테이너에 노출.
      # 영속 데이터는 PG (postgres_data 볼륨) 로 이관됨 (2026-05-22, 0e33abd).
      - ./drf-server:/app
      - ./drf-server/media:/app/media
      # 학습 자산(parquet 스냅샷 등) — 운영 DB와 분리해 별도 보관.
      # ARIMA/IF 학습 셋 export, 모델 재현용 데이터셋 스냅샷이 여기에 적재됨.
      - ./drf-server/ml_datasets:/app/ml_datasets
    command:
      # workers=1 + --reload 조합 — multi-worker에선 inotify가 워커별 분산되며 reload가 불안정.
      # threads=4 — 더미 폭주 시 단일 워커가 직렬화돼 fastapi→drf 타임아웃 폭주 + 대시보드 멈춤
      # 발생했음(2026-05-14). 스레드로 동시성 확보 (gunicorn gthread 자동 선택).
      # 운영 배포 시 workers=(2*CPU)+1 권장, --reload 제거.
      - gunicorn
      - config.wsgi:application
      - --bind=0.0.0.0:8000
      - --workers=1
      - --threads=4
      - --reload
      - --access-logfile=-
      - --config=/app/gunicorn.conf.py
    # healthcheck 를 추가하는 이유:
    # fastapi 와 celery-worker 가 `condition: service_healthy` 로 drf 에 의존한다.
    # healthcheck 가 없으면 Docker 는 컨테이너가 시작됐을 때 즉시 healthy 로 간주하지 않고
    # "no healthcheck" 상태로 두어 의존 서비스 시작 순서가 불안정해진다.
    # /health/ 엔드포인트(config/urls.py)가 200 을 반환하면 DB 연결까지 완료된 것이므로
    # 이 시점 이후 fastapi/celery 가 drf API 를 안전하게 호출할 수 있다.
    # start_period: 30s — 마이그레이션 + gunicorn 기동 시간 확보.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  fastapi:
    build:
      context: ./fastapi-server
    image: diconai/fastapi:dev
    user: "${UID:-1000}:${GID:-1000}"  # host UID 매핑 — drf 와 동일 이유
    env_file: ./.env.docker
    environment:
      DRF_BASE_URL: http://drf:8000
      REDIS_URL: redis://redis:6379/0
    volumes:
      # 소스 핫리로드 — celery-worker/drf와 동일하게 호스트 코드를 마운트해
      # 라우터/서비스 코드 변경이 `restart` 한 번으로 반영된다.
      - ./fastapi-server:/app
      # IF 모델 .pkl 공유 (read-only) — drf 가 학습 → fastapi 가 추론.
      # host: ./drf-server/ml_models/  →  fastapi: /app/ml_models/ (Settings.ML_MODELS_DIR)
      - ./drf-server/ml_models:/app/ml_models:ro
    # healthcheck 를 추가하는 이유:
    # celery-worker 가 `condition: service_healthy` 로 fastapi 에 의존한다.
    # fastapi 가 완전히 뜨기 전에 celery-worker 가 /internal/alarms/push/ 를 호출하면
    # 연결 실패 → 알람 미전달이 발생할 수 있다.
    # /health/ 엔드포인트(app.py)가 200 을 반환하면 라우터·Redis 연결이 완료된 상태.
    # start_period: 30s — ML 모델 로드(joblib) 시간 확보.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      drf:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped

    # 이성현 수정 — Celery 큐 분리: alarm 전용 워커
  # alarm 큐만 바라봄 (-Q alarm), 알람 태스크 지연 방지
  celery-worker-alarm:
    image: diconai/drf:dev
    user: "${UID:-1000}:${GID:-1000}"
    command: ["celery", "-A", "config", "worker", "-Q", "alarm", "-l", "info", "--concurrency=2"]
    env_file: ./.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: "config.settings.prod"
      REDIS_URL: redis://redis:6379/0
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
      PROMETHEUS_MULTIPROC_DIR: /app/prometheus_multiproc/celery-alarm
    volumes:
      - ./drf-server:/app
      - ./drf-server/media:/app/media
    depends_on:
      drf:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      postgres:
        condition: service_healthy
            # 이성현 추가 — Celery 전용 healthcheck
    # Dockerfile 기본값(HTTP 8000 포트)은 웹서버용이라 Celery에 적합하지 않음
    # celery inspect ping 으로 워커 프로세스가 살아있는지 직접 확인
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # 이성현 수정 — Celery 큐 분리: metric 전용 워커
  # metric 큐만 바라봄 (-Q metric), 주기적 메트릭 수집 담당
  celery-worker-metric:
    image: diconai/drf:dev
    user: "${UID:-1000}:${GID:-1000}"
    command: ["celery", "-A", "config", "worker", "-Q", "metric", "-l", "info", "--concurrency=1"]
    env_file: ./.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: "config.settings.prod"
      REDIS_URL: redis://redis:6379/0
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
      PROMETHEUS_MULTIPROC_DIR: /app/prometheus_multiproc/celery-metric
    volumes:
      - ./drf-server:/app
      - ./drf-server/media:/app/media
    depends_on:
      drf:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      postgres:
        condition: service_healthy
            # 이성현 추가 — Celery 전용 healthcheck
    # Dockerfile 기본값(HTTP 8000 포트)은 웹서버용이라 Celery에 적합하지 않음
    # celery inspect ping 으로 워커 프로세스가 살아있는지 직접 확인
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped


  celery-beat:
    image: diconai/drf:dev
    user: "${UID:-1000}:${GID:-1000}"  # host UID 매핑 — drf 와 동일 이유
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    env_file: ./.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: "config.settings.prod"
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
    volumes:
      - ./drf-server:/app          # 소스코드 실시간 반영
    depends_on:
      drf:
        condition: service_healthy
      postgres:
        condition: service_healthy
            # 이성현 추가 — Celery 전용 healthcheck
    # Dockerfile 기본값(HTTP 8000 포트)은 웹서버용이라 Celery에 적합하지 않음
    # celery inspect ping 으로 워커 프로세스가 살아있는지 직접 확인
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0-alpine
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9121:9121"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    depends_on:
      - drf
      - fastapi
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    env_file: ./.env.docker
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redis_data:
  drf_static:
  prom_data:
  grafana_data:
  postgres_data:
