{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 산재 예방 통합 관제 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;
  --danger:#f85149;--safe:#3fb950;--blue:#58a6ff;--accent:#1f6feb;
}
body{background:var(--bg);color:var(--text);font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:13px;min-height:100vh;display:flex;align-items:center;justify-content:center;}

.login-wrap{width:360px;}

.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .logo-box{width:64px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px;margin-bottom:10px;}
.login-logo .system-name{font-size:16px;font-weight:700;letter-spacing:0.02em;}

.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px 28px 24px;}
.login-card h2{font-size:15px;font-weight:700;margin-bottom:20px;}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;}
.form-group input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.form-group input:focus{border-color:var(--accent);}

.error-msg{display:none;color:var(--danger);font-size:11px;margin-bottom:10px;padding:8px 10px;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:5px;}
.error-msg.show{display:block;}

.login-btn{
  width:100%;background:var(--accent);color:#fff;border:none;
  padding:10px;border-radius:6px;font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.login-btn:hover{background:#1a5fd6;}
.login-btn:disabled{background:var(--bg3);color:var(--text2);cursor:not-allowed;}

.login-footer{text-align:center;margin-top:14px;font-size:11px;color:var(--text2);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-box">LOGO</div>
    <div class="system-name">산재 예방 통합 관제 시스템</div>
  </div>

  <div class="login-card">
    <h2>로그인</h2>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">로그인</button>
    </form>
  </div>
  <div class="login-footer">산업재해 예방을 위한 스마트 관제 플랫폼</div>
</div>

<script>
(function () {
  // 이미 로그인 상태면 대시보드로
  if (localStorage.getItem('access_token')) {
    window.location.href = '/';
    return;
  }

  const form    = document.getElementById('loginForm');
  const btn     = document.getElementById('loginBtn');
  const errMsg  = document.getElementById('errorMsg');

  function showError(msg) {
    errMsg.textContent = msg;
    errMsg.classList.add('show');
  }
  function hideError() {
    errMsg.classList.remove('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    btn.disabled = true;
    btn.textContent = '로그인 중...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/auth/login/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || '로그인에 실패했습니다.');
        return;
      }

      localStorage.setItem('access_token',  data.access);
      localStorage.setItem('refresh_token', data.refresh);
      localStorage.setItem('username',      data.username);
      localStorage.setItem('role',          data.role);

      window.location.href = '/';
    } catch (err) {
      showError('서버에 연결할 수 없습니다.');
    } finally {
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  });
})();
</script>
</body>
</html>
