{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}관리자{% endblock %} - 산재 예방 통합 관제 시스템</title>
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="app-container">

    {% include 'components/admin_sidebar.html' %}
    <div class="main-wrapper">

        <header class="topbar">
            <div class="topbar-left">
                <h1 class="system-title">산재 예방 통합 관제 시스템</h1>
                <button class="btn-realtime" onclick="location.href='/dashboard/'">실시간 관제 홈</button>
            </div>
            <div class="topbar-right">
                <div class="admin-info">
                    <span id="adminName" class="admin-name"></span>
                    <span id="adminRole" class="admin-email"></span>
                </div>
                <button id="btnHome" class="icon-btn" title="홈" aria-label="홈으로 이동">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                </button>
                <div class="topbar-actions">
                    <button id="btnLogout" class="btn-outline">로그아웃</button>
                </div>
            </div>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

{% include 'components/app_config.html' %}
<script src="{% static 'js/shared/config.js' %}"></script>
<script src="{% static 'js/shared/auth.js' %}"></script>
<script src="{% static 'js/admin/main.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
