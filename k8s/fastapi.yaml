apiVersion: v1 # k8s API 버전 선언
kind: Service # 클러스터 내부에서 fastapi 파드에 접근할 네트워크 엔드포인트
metadata:
  name: fastapi # 다른 파드가 "fastapi:8001" 로 접속할 때 이 이름을 DNS로 사용
  namespace: diconai
spec:
  selector:
    app: fastapi # 아래 Deployment의 파드 라벨과 매칭
  ports:
    - port: 8001 # Service가 클러스터 내부에 노출하는 포트
      targetPort: 8001 # 실제 파드 컨테이너의 포트
  type: NodePort # minikube에서 브라우저로 직접 접속하기 위해 NodePort 사용
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: diconai
spec:
  replicas: 1 # 단일 인스턴스 — WebSocket 브로드캐스트 상태를 메모리에 들고 있어서 복수 replica 불가
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi # Service의 selector와 일치해야 트래픽이 연결됨
    spec:
      containers:
        - name: fastapi
          image: diconai/fastapi:dev # minikube에 직접 빌드해서 올려야 함
          imagePullPolicy: IfNotPresent    # 이성현 수정 — 로컬 이미지 우선, 외부 pull 방지
          ports:
            - containerPort: 8001 # uvicorn이 바인딩하는 포트
          envFrom: # configmap.yaml과 secret.yaml의 값을 환경변수로 한꺼번에 주입
            - configMapRef:
                name: diconai-config # configmap.yaml의 모든 키를 환경변수로 주입
            - secretRef:
                name: diconai-secret # secret.yaml의 모든 키를 환경변수로 주입
          readinessProbe: # fastapi가 응답할 준비가 됐는지 확인 — 통과 전까지 트래픽 차단
            httpGet:
              path: /health/ # docker-compose의 healthcheck와 동일한 엔드포인트
              port: 8001
            initialDelaySeconds: 30 # ML 모델 로드(joblib) 시간 확보
            periodSeconds: 15 # 15초마다 체크
            failureThreshold: 5 # 5번 실패해야 비정상으로 판단
          resources:
            requests:
              cpu: "100m" # 최소 보장 CPU
              memory: "256Mi" # 최소 보장 메모리 — ML 모델 로드로 drf보다 메모리 필요
            limits:
              cpu: "300m" # 최대 사용 CPU
              memory: "512Mi" # 최대 사용 메모리
