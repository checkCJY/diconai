apiVersion: v1 # k8s API 버전 선언
kind: PersistentVolumeClaim # 디스크 저장소 요청 — redis 데이터를 파드 재시작 후에도 유지하기 위함
metadata:
  name: redis-pvc # 아래 Deployment의 volumes에서 이 이름을 참조
  namespace: diconai
spec:
  accessModes:
    - ReadWriteOnce # 단일 노드에서만 읽기/쓰기 허용
  resources:
    requests:
      storage: 1Gi # 할당할 디스크 용량
---
apiVersion: v1
kind: Service # 클러스터 내부에서 redis 파드에 접근할 네트워크 엔드포인트
metadata:
  name: redis # 다른 파드가 "redis:6379" 로 접속할 때 이 이름을 DNS로 사용
  namespace: diconai
spec:
  selector:
    app: redis # 아래 Deployment의 파드 라벨과 매칭
  ports:
    - port: 6379 # Service가 클러스터 내부에 노출하는 포트
      targetPort: 6379 # 실제 파드 컨테이너의 포트
---
apiVersion: apps/v1
kind: Deployment # Redis는 StatefulSet 대신 Deployment 사용 — 파드 이름 고정 불필요, PVC로 데이터 유지
metadata:
  name: redis
  namespace: diconai
spec:
  replicas: 1 # Redis도 단일 인스턴스 — 클러스터 모드는 별도 설정 필요
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis # Service의 selector와 일치해야 트래픽이 연결됨
    spec:
      containers:
        - name: redis
          image: redis:7-alpine # docker-compose와 동일한 이미지
          command:
            - redis-server
            - --appendonly
            - "yes" # AOF(Append Only File) 활성 — 재시작 후 데이터 복구 가능
          ports:
            - containerPort: 6379
          readinessProbe: # redis가 응답할 준비가 됐는지 확인
            exec:
              command: ["redis-cli", "ping"] # PONG 응답 오면 정상
            initialDelaySeconds: 5 # 컨테이너 시작 후 5초 뒤부터 체크
            periodSeconds: 10 # 10초마다 체크
          resources:
            requests:
              cpu: "100m" # 최소 보장 CPU (0.1코어)
              memory: "128Mi" # 최소 보장 메모리
            limits:
              cpu: "200m" # 최대 사용 CPU (0.2코어)
              memory: "256Mi" # 최대 사용 메모리
          volumeMounts:
            - name: redis-data # 아래 volumes의 name과 일치해야 함
              mountPath: /data # redis가 AOF/RDB 파일을 저장하는 경로
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc # 위에서 만든 PVC 이름 참조
