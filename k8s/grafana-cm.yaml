          "gridPos": {"x": 12, "y": 32, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, task_name) (rate(celery_task_queued_seconds_bucket[5m])))",
              "legendFormat": "{{task_name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["diconai"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "diconai — 알람 파이프라인",
      "uid": "diconai-alarm",
      "version": 1,
      "weekStart": ""
    }

