apiVersion: v1 # k8s API 버전 선언
kind: Service # 클러스터 내부에서 postgres 파드에 접근할 수 있는 네트워크 엔드포인트 생성
metadata:
  name: postgres # 다른 파드가 "postgres:5432" 로 접속할 때 이 이름을 DNS로 사용
  namespace: diconai # diconai 네임스페이스에 소속
spec:
  selector:
    app: postgres # 아래 StatefulSet의 파드 라벨과 매칭 — 이 라벨을 가진 파드로 트래픽 전달
  ports:
    - port: 5432 # Service가 외부(클러스터 내부)에 노출하는 포트
      targetPort: 5432 # 실제 파드 컨테이너의 포트
---
apiVersion: apps/v1 # apps 그룹의 v1 API — Deployment/StatefulSet 등이 여기 속함
kind: StatefulSet # DB처럼 상태가 있는 앱용. Deployment와 달리 파드 이름이 고정(postgres-0)되고 재시작해도 같은 스토리지를 재사용
metadata:
  name: postgres # StatefulSet 이름
  namespace: diconai
spec:
  serviceName: postgres # 이 StatefulSet을 관리하는 Service 이름 (위의 Service와 연결)
  replicas: 1 # DB는 단일 인스턴스 — 복수 replica는 데이터 충돌 위험
  selector:
    matchLabels:
      app: postgres # 이 StatefulSet이 관리할 파드의 라벨 조건
  template: # 아래부터 실제 파드 명세
    metadata:
      labels:
        app: postgres # Service의 selector와 일치해야 트래픽이 연결됨
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine # docker-compose와 동일한 이미지
          ports:
            - containerPort: 5432 # 파드 내부 컨테이너가 사용하는 포트
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: diconai-config # configmap.yaml의 name
                  key: POSTGRES_DB # configmap.yaml의 키
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: diconai-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diconai-secret # secret.yaml의 name
                  key: POSTGRES_PASSWORD # secret.yaml의 키
          args:
            - postgres
            - -c
            - shared_buffers=128MB # docker-compose(256MB)보다 낮춤 — minikube 메모리 절약
            - -c
            - effective_cache_size=512MB # 쿼리 플래너가 사용할 수 있다고 가정하는 캐시 크기
            - -c
            - work_mem=8MB # 정렬/해시 연산 시 사용할 메모리
            - -c
            - max_connections=50 # docker-compose와 동일
          readinessProbe: # 파드가 트래픽 받을 준비가 됐는지 확인 — 통과 전까지 Service가 연결 안 함
            exec:
              command: ["pg_isready", "-U", "diconai"] # PostgreSQL이 실제로 응답하는지 확인
            initialDelaySeconds: 15 # 컨테이너 시작 후 15초 뒤부터 체크 시작
            periodSeconds: 10 # 10초마다 체크
          resources:
            requests:
              cpu: "200m" # 최소 보장 CPU (0.2코어) — 스케줄러가 이 만큼 여유 있는 노드에 배치
              memory: "256Mi" # 최소 보장 메모리
            limits:
              cpu: "500m" # 최대 사용 가능 CPU (0.5코어)
              memory: "512Mi" # 최대 사용 가능 메모리 — 초과 시 OOM으로 파드 재시작
          volumeMounts:
            - name: postgres-data # 아래 volumeClaimTemplates의 name과 일치해야 함
              mountPath: /var/lib/postgresql/data # PostgreSQL 데이터 저장 경로
  volumeClaimTemplates: # StatefulSet 전용 — 파드마다 자동으로 PVC를 생성해줌
    - metadata:
        name: postgres-data # volumeMounts의 name과 일치해야 함
      spec:
        accessModes:
          - ReadWriteOnce # 단일 노드에서만 읽기/쓰기 허용 — DB는 동시 다중 접근 불가
        resources:
          requests:
            storage: 2Gi # 할당할 디스크 용량
