# 이성현 추가 — GitHub Actions CI 파이프라인
# PR이 devleop 브랜치로 올라올 때마다 자동 실행됨.
# 순서: 코드 스타일 검사(ruff) → 테스트 실행(pytest) → 결과 리포트
name: CI

on:
  pull_request:
    branches:
      - devleop  # PR 대상 브랜치

jobs:
  test:
    runs-on: ubuntu-latest  # GitHub에서 제공하는 우분투 서버에서 실행

    services:
      # 테스트용 PostgreSQL 서버 — Django가 테스트 DB를 여기에 생성
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: diconai_test
          POSTGRES_USER: diconai
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 이성현 추가 — 테스트용 Redis 서버
      # test_ai_mute_guard.py의 alarm_dedupe._redis()가 raw Redis 클라이언트 사용.
      # LocMemCache(Django 메모리 캐시)는 get_client() 메서드가 없어 AttributeError 발생 →
      # 실제 Redis가 필요함.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_DB: diconai_test
      POSTGRES_USER: diconai
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: "False"
      REDIS_URL: redis://localhost:6379/0


    steps:
      # 1단계: 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2단계: Python 설치
      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            drf-server/requirements.txt
            drf-server/requirements-dev.txt

      # 3단계: 패키지 설치
      - name: 의존성 설치
        working-directory: drf-server
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      # 4단계: 코드 스타일 검사 (ruff)
      # 문법 오류, 사용하지 않는 import 등을 자동으로 검사
      - name: 코드 스타일 검사 (ruff)
        working-directory: drf-server
        run: |
          ruff check .

      # 5단계: 테스트 실행
      - name: 테스트 실행 (pytest)
        working-directory: drf-server
        run: |
          pytest apps/ -v --tb=short
